name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest -q

  frontend:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        # Use ``npm install`` (not ``npm ci``) because the repo's
        # package-lock.json is regenerated on every install and would
        # otherwise produce noisy "lockfile out of sync" failures.  If
        # the lockfile is later kept clean, switch to ``npm ci``.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
