name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Install a pinned gitleaks binary directly (rather than the official
      # action) for two reasons:
      #   1. We run `gitleaks dir` (working-tree mode), not the action's default
      #      git-history scan — history mode would re-flag the accepted PIT key
      #      that remains in history (BACKLOG C1; rotation gated as C3).
      #   2. The official action requires a license key for GitHub organizations;
      #      the binary does not.
      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Working-tree scan. A clean checkout contains only committed source (no
      # .venv / node_modules / gitignored secrets/), so this gates "no NEW secret
      # in the tree." Blocking: --exit-code 1 fails the build on any finding.
      - name: Scan working tree for secrets
        run: gitleaks dir . --config .gitleaks.toml --redact --no-banner --exit-code 1

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest -q

  frontend:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        # Use ``npm install`` (not ``npm ci``) because the repo's
        # package-lock.json is regenerated on every install and would
        # otherwise produce noisy "lockfile out of sync" failures.  If
        # the lockfile is later kept clean, switch to ``npm ci``.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
