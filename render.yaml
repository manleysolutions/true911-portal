databases:
  - name: true911-db
    plan: starter
    databaseName: true911
    postgresMajorVersion: 16

  - name: true911-redis
    plan: starter

services:
  # FastAPI Backend
  - type: web
    name: true911-api
    runtime: python
    plan: starter
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: true911-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://true911.com,https://www.true911.com,https://true911-web-demo.onrender.com,https://true911-web-prod.onrender.com"
      - key: APP_MODE
        value: production
      - key: REDIS_URL
        fromService:
          name: true911-redis
          type: redis
          property: connectionString
      - key: INTEGRATION_WEBHOOK_SECRET
        generateValue: true
      - key: ZOHO_WEBHOOK_SECRET
        generateValue: true
      - key: TRUE911_BOOTSTRAP_ADMIN_PASSWORD
        generateValue: true
      - key: SEED_DEMO
        value: "false"
      - key: PUBLIC_URL
        value: "https://www.true911.com"
      # ── Phase 1a LLLM soak — internal-only, deterministic-only ──
      # ANTHROPIC_API_KEY is set in the dashboard (secret pattern,
      # already in place for the support assistant) and is NOT
      # referenced from this file.  Phase 1a runs in deterministic-
      # fallback mode (LLLM_ALLOW_EXTERNAL=false), so even with a
      # valid API key NO call to Anthropic is made.  Flipping
      # LLLM_ALLOW_EXTERNAL to "true" requires a separate PR and
      # explicit governance approval — see docs/AI_OPERATIONAL_SAFETY.md
      # §3 and docs/LLLM_PHASE1_ROLLOUT.md §4.
      - key: FEATURE_LLLM
        value: "true"
      - key: LLLM_PROVIDER
        value: "anthropic"
      - key: LLLM_ALLOW_EXTERNAL
        value: "false"
      - key: LLLM_DAILY_TOKEN_CAP_PER_TENANT
        value: "100000"
      - key: LLLM_PROVIDER_TIMEOUT_SECONDS
        value: "5.0"
      - key: LLLM_CACHE_TTL_SECONDS
        value: "300"
      - key: LLLM_DEFAULT_MODEL
        value: "claude-sonnet-4-20250514"
      # SMTP — set these in Render dashboard for email delivery
      # - key: SMTP_HOST
      #   value: smtp.sendgrid.net
      # - key: SMTP_USER
      #   value: apikey
      # - key: SMTP_PASSWORD
      #   sync: false

  # RQ Worker (shares codebase with API)
  - type: worker
    name: true911-worker
    runtime: python
    plan: starter
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: true911-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: true911-redis
          type: redis
          property: connectionString
      - key: APP_MODE
        value: production

  # React Frontend (Static Site)
  - type: web
    name: true911-web-prod
    runtime: static
    plan: starter
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      # SPA fallback — every non-file path serves index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://true911-api.onrender.com/api
      - key: VITE_APP_MODE
        value: production
      # Phase 1a LLLM soak — surfaces the AI Health nav entry (NOC nav
      # only) and the Command Center additive card.  Backend
      # internal-only gate (_require_internal_context) is what
      # actually enforces who can use it — this flag just controls
      # whether the UI tries to render the surface.
      - key: VITE_FEATURE_LLLM
        value: "true"
